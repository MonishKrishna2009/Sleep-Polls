# ------------------------------------------------------------
# Poll Settings
# ------------------------------------------------------------

# Duration of a sleep poll in seconds.
#
# Recommended:
# 15 - Fast servers
# 20 - Balanced
# 30+ - Large SMPs
poll-duration-seconds: 20

# Percentage of YES votes required to skip the night.
#
# Examples:
# 50 = Simple majority
# 60 = Slightly stricter
# 75 = Large consensus required
required-percentage: 50


# ------------------------------------------------------------
# BossBar Settings
# ------------------------------------------------------------

bossbar:

  # Enables the bossbar countdown display.
  #
  # Displays:
  # - Remaining time
  # - Required votes
  # - Current YES votes
  enabled: true


# ------------------------------------------------------------
# Sound Settings
# ------------------------------------------------------------

sounds:

  # Enables all plugin sounds.
  #
  # Includes:
  # - Poll start sound
  # - Countdown sounds
  # - Success/failure sounds
  enabled: true


# ------------------------------------------------------------
# Weather Settings
# ------------------------------------------------------------

weather:

  # Clears rain after a successful poll.
  clear-rain: true

  # Clears thunder after a successful poll.
  clear-thunder: true


# ------------------------------------------------------------
# World Settings
# ------------------------------------------------------------

worlds:

  # Worlds where sleep polls are DISABLED.
  #
  # Example:
  # blacklist:
  #   - lobby
  #   - spawn
  #   - minigames
  blacklist:
    - lobby
    - minigames


# ------------------------------------------------------------
# Database Settings
# ------------------------------------------------------------
database:

  type: SQLITE # Options: SQLITE, MARIADB (not MYSQL)

  sqlite:
    file: data.db

  mariadb:
    host: localhost
    port: 3306
    database: sleeppolls
    username: root
    password: password
    pool-size: 10

